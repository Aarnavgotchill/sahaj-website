<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sahaj Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0d0c0c;
  --accent:#c4a882;
  --accent2:#8a7560;
  --bone:#e8e0d4;
  --muted:#5a5550;
  --ease-cin:cubic-bezier(0.77,0,0.175,1);
  --ease-soft:cubic-bezier(0.4,0,0.2,1);
}

html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg);
  color:var(--bone);
  font-family:'Montserrat',sans-serif;
  cursor:default;
}

/* ── HEADER ── */
header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:grid;grid-template-columns:1fr auto 1fr;
  align-items:start;
  padding:28px 44px;
  pointer-events:none;
}
.h-logo{
  font-weight:200;font-size:10px;letter-spacing:.38em;
  text-transform:uppercase;color:var(--bone);opacity:.65;
  line-height:1.7;
}
.h-logo-sub{
  display:block;
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:300;font-style:italic;
  letter-spacing:.06em;text-transform:none;
  color:var(--accent);opacity:1;
  line-height:1.1;
  margin-top:3px;
}
.h-mid{
  font-weight:200;font-size:10px;letter-spacing:.3em;
  text-transform:uppercase;color:var(--muted);
  transition:opacity .4s;text-align:center;padding-top:3px;
}
.h-back{
  font-weight:200;font-size:10px;letter-spacing:.32em;text-transform:uppercase;
  color:var(--muted);cursor:pointer;pointer-events:all;
  border:none;background:none;
  transition:color .3s;opacity:0;visibility:hidden;
  text-align:right;padding-top:3px;
}
.h-back.show{opacity:1;visibility:visible}
.h-back:hover{color:var(--accent)}

/* ════════════════════════════════════════
   LEVEL 1 — Welcome: 5 strip catalogue
   Each strip has:
   - collection name vertical on left edge
   - large SAHAJ letter centered
   ════════════════════════════════════════ */
#l1{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  z-index:10;
  transition:opacity .55s var(--ease-soft);
}
#l1.out{opacity:0;pointer-events:none}

.strip-row{display:flex;align-items:center;gap:10px}

.strip{
  position:relative;
  width:110px;height:300px;
  overflow:hidden;
  cursor:pointer;
  transition:width .65s var(--ease-cin), filter .4s, transform .4s var(--ease-soft);
  filter:brightness(.7);
  flex-shrink:0;
}
.strip:hover{width:128px;filter:brightness(1);transform:scaleY(1.02)}

/* unique dark tones per strip */
.strip:nth-child(1){background:linear-gradient(160deg,#1a1714 0%,#252018 100%)}
.strip:nth-child(2){background:linear-gradient(160deg,#14171a 0%,#182025 100%)}
.strip:nth-child(3){background:linear-gradient(160deg,#1a1416 0%,#231820 100%)}
.strip:nth-child(4){background:linear-gradient(160deg,#141a18 0%,#1b2520 100%)}
.strip:nth-child(5){background:linear-gradient(160deg,#1a1a14 0%,#252518 100%)}

/* big SAHAJ letter */
.strip-letter{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-family:'Cormorant Garamond',serif;
  font-weight:300;
  font-size:clamp(64px,7vw,96px);
  color:transparent;
  -webkit-text-stroke:1px rgba(196,168,130,.28);
  line-height:1;
  user-select:none;
  transition:-webkit-text-stroke .35s,transform .4s var(--ease-soft);
  z-index:2;
}
.strip:hover .strip-letter{
  -webkit-text-stroke:1px rgba(196,168,130,.7);
  transform:translate(-50%,-50%) scale(1.06);
}

/* collection name — rotated on left edge */
.strip-name{
  position:absolute;
  left:10px;top:50%;
  transform:translateY(-50%) rotate(-90deg);
  transform-origin:center center;
  font-weight:200;
  font-size:8px;
  letter-spacing:.32em;
  text-transform:uppercase;
  color:rgba(196,168,130,.45);
  white-space:nowrap;
  z-index:3;
  transition:color .3s;
}
.strip:hover .strip-name{color:var(--accent)}

/* strip number top-right */
.strip-num{
  position:absolute;top:10px;right:9px;
  font-size:8px;font-weight:200;letter-spacing:.28em;
  color:rgba(196,168,130,.25);z-index:3;
}

/* subtle bottom line accent */
.strip::after{
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:2px;background:var(--accent);opacity:0;
  transition:opacity .3s;
}
.strip:hover::after{opacity:.4}

/* ════════════════════════════════════════
   LEVEL 2 — Fullscreen slideshow of all 5
   collections, starting at clicked index
   ════════════════════════════════════════ */
#l2{
  position:fixed;inset:0;
  z-index:20;
  opacity:0;pointer-events:none;
  transition:opacity .55s var(--ease-soft);
}
#l2.in{opacity:1;pointer-events:all}

/* Each slide = full screen card with image bg + name overlay */
.cslide{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  opacity:0;
  transition:opacity 0s;
  pointer-events:none;
}
.cslide.active{opacity:1;pointer-events:all}

/* slide background fills full screen */
.cslide-bg{
  position:absolute;inset:0;
  transition:transform 8s linear; /* slow ken-burns */
}

/* full-bg tones per slide (since placeholder, use rich dark gradients) */
.cslide:nth-child(1) .cslide-bg{background:linear-gradient(135deg,#1a1714 0%,#2e2820 50%,#1a1714 100%)}
.cslide:nth-child(2) .cslide-bg{background:linear-gradient(135deg,#0e1318 0%,#1a2530 50%,#0e1318 100%)}
.cslide:nth-child(3) .cslide-bg{background:linear-gradient(135deg,#180f14 0%,#2a1822 50%,#180f14 100%)}
.cslide:nth-child(4) .cslide-bg{background:linear-gradient(135deg,#0e1710 0%,#182818 50%,#0e1710 100%)}
.cslide:nth-child(5) .cslide-bg{background:linear-gradient(135deg,#171714 0%,#28261a 50%,#171714 100%)}

/* Dark overlay so text is legible */
.cslide-overlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,.38);
}

/* Ghost — previous slide peeking left */
.cslide-ghost{
  position:absolute;
  top:0;bottom:0;left:0;
  width:220px;
  overflow:hidden;
  opacity:0;
  pointer-events:none;
  transition:opacity .5s;
}
.cslide.active .cslide-ghost{opacity:.18}
.ghost-bg{position:absolute;inset:0}

/* ── Main focused card ── */
.cslide-card{
  position:relative;
  width:min(58vw,780px);
  height:min(70vh,560px);
  overflow:hidden;
  flex-shrink:0;
  margin-left:180px; /* offset right to make room for ghost */
}

/* corner brackets */
.cslide-card::before,.cslide-card::after,.cb-bl,.cb-br{
  content:'';position:absolute;width:20px;height:20px;
  border-color:rgba(196,168,130,.45);border-style:solid;z-index:10;pointer-events:none;
}
.cslide-card::before{top:0;left:0;border-width:1px 0 0 1px}
.cslide-card::after{top:0;right:0;border-width:1px 1px 0 0}
.cb-bl{bottom:0;left:0;border-width:0 0 1px 1px}
.cb-br{bottom:0;right:0;border-width:0 1px 1px 0}

.card-bg{position:absolute;inset:0}
.cslide:nth-child(1) .card-bg{background:linear-gradient(135deg,#1a1714,#2e2820)}
.cslide:nth-child(2) .card-bg{background:linear-gradient(135deg,#0e1318,#1a2530)}
.cslide:nth-child(3) .card-bg{background:linear-gradient(135deg,#180f14,#2a1822)}
.cslide:nth-child(4) .card-bg{background:linear-gradient(135deg,#0e1710,#182818)}
.cslide:nth-child(5) .card-bg{background:linear-gradient(135deg,#171714,#28261a)}

/* big name inside card */
.card-name{
  position:absolute;
  bottom:0;left:0;right:0;
  font-family:'Cormorant Garamond',serif;
  font-weight:300;
  font-size:clamp(48px,7.5vw,100px);
  letter-spacing:-.01em;
  line-height:1;
  color:var(--accent);
  padding:0 28px 22px;
  z-index:5;
  opacity:0;transform:translateY(16px);
  transition:opacity .6s .1s var(--ease-cin), transform .6s .1s var(--ease-cin);
}
.cslide.active .card-name{opacity:1;transform:none}

/* arrow icon */
.card-arr{
  position:absolute;top:16px;left:16px;
  width:32px;height:32px;
  border:1px solid rgba(196,168,130,.35);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  z-index:6;
  opacity:0;transition:opacity .45s .4s;
}
.cslide.active .card-arr{opacity:1}
.card-arr svg{stroke:var(--accent);width:12px;height:12px}

/* Slide counter inside card */
.card-counter{
  position:absolute;bottom:28px;right:28px;
  font-size:9px;font-weight:200;letter-spacing:.32em;
  color:rgba(196,168,130,.45);z-index:6;
}

/* ── Nav arrows on sides ── */
.slide-nav{
  position:fixed;
  top:50%;transform:translateY(-50%);
  width:52px;height:52px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:50;
  border:none;background:none;
  transition:opacity .3s;
}
.slide-nav svg{stroke:var(--muted);width:22px;height:22px;transition:stroke .3s}
.slide-nav:hover svg{stroke:var(--accent)}
.slide-nav.dim{opacity:.2;pointer-events:none}
#nav-prev{left:16px}
#nav-next{right:16px}

/* ── Bottom bar ── */
#l2-bar{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;align-items:center;justify-content:center;
  gap:12px;padding:0 0 36px;z-index:60;
  opacity:0;transition:opacity .5s .35s;
}
#l2.in #l2-bar{opacity:1}

.btn-explore{
  font-weight:300;font-size:10px;letter-spacing:.38em;text-transform:uppercase;
  color:var(--bone);
  padding:12px 30px;
  border:1px solid rgba(196,168,130,.25);
  background:rgba(14,12,12,.85);
  backdrop-filter:blur(10px);
  cursor:pointer;
  transition:border-color .3s,color .3s;
}
.btn-explore:hover{border-color:var(--accent);color:var(--accent)}
.btn-close{
  width:38px;height:38px;
  border:1px solid rgba(196,168,130,.2);
  background:rgba(14,12,12,.85);
  backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:border-color .3s;
}
.btn-close:hover{border-color:var(--accent)}
.btn-close svg{stroke:var(--muted);width:12px;height:12px;transition:stroke .3s}
.btn-close:hover svg{stroke:var(--accent)}

/* ════════════════════════════════════════
   LEVEL 3 — Immersive Gallery
   ════════════════════════════════════════ */
#l3{
  position:fixed;inset:0;
  z-index:30;
  opacity:0;pointer-events:none;
  background:#080807;
  transition:opacity .7s var(--ease-soft);
  overflow:hidden;
}
#l3.in{opacity:1;pointer-events:all}

/* ── Fullscreen artwork stage ── */
#g-stage{
  position:absolute;
  inset:0;bottom:160px;
  display:flex;align-items:center;justify-content:center;
}

/* ── Each artwork ── */
.artwork{
  position:absolute;
  inset:0;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
}
.artwork.active{opacity:1;pointer-events:all}

/* the artwork frame — portrait ratio */
.art-frame{
  position:relative;
  width:min(42vw,520px);
  height:min(70vh,680px);
  overflow:hidden;
  transform:scale(.96);
  transition:transform 1s var(--ease-cin);
}
.artwork.active .art-frame{transform:scale(1)}

/* corner brackets on artwork */
.art-frame::before,.art-frame::after,.af-bl,.af-br{
  content:'';position:absolute;width:28px;height:28px;
  border-color:rgba(196,168,130,.5);border-style:solid;z-index:20;pointer-events:none;
}
.art-frame::before{top:0;left:0;border-width:1px 0 0 1px}
.art-frame::after{top:0;right:0;border-width:1px 1px 0 0}
.af-bl{bottom:0;left:0;border-width:0 0 1px 1px}
.af-br{bottom:0;right:0;border-width:0 1px 1px 0}

/* The SVG artwork canvas */
.art-canvas{
  position:absolute;inset:0;
  overflow:hidden;
}
.art-canvas svg{width:100%;height:100%}

/* ambient glow behind artwork */
.art-glow{
  position:absolute;
  inset:-60px;
  border-radius:50%;
  opacity:.12;
  filter:blur(80px);
  transition:opacity 1.2s;
  pointer-events:none;
  z-index:-1;
}
.artwork.active .art-glow{opacity:.2}

/* metadata panel — right side */
.art-meta{
  position:absolute;
  right:calc(50% - min(21vw,260px) - 60px - 220px);
  top:50%;transform:translateY(-50%);
  width:200px;
  opacity:0;
  transform:translateY(-50%) translateX(20px);
  transition:opacity .7s .4s var(--ease-cin), transform .7s .4s var(--ease-cin);
}
.artwork.active .art-meta{opacity:1;transform:translateY(-50%) translateX(0)}

.art-num{
  font-family:'Cormorant Garamond',serif;
  font-size:72px;font-weight:300;
  color:rgba(196,168,130,.08);
  line-height:1;margin-bottom:16px;
}
.art-title{
  font-family:'Cormorant Garamond',serif;
  font-size:18px;font-weight:300;font-style:italic;
  color:var(--accent);letter-spacing:.03em;
  margin-bottom:10px;
}
.art-desc{
  font-size:9px;font-weight:200;letter-spacing:.32em;
  text-transform:uppercase;color:var(--muted);
  line-height:1.8;
}
.art-line{
  width:30px;height:1px;background:rgba(196,168,130,.3);
  margin:14px 0;
}
.art-dim{
  font-family:'Cormorant Garamond',serif;
  font-size:11px;font-weight:300;
  color:var(--accent2);letter-spacing:.08em;font-style:italic;
}

/* ── Ambient background wash ── */
#g-wash{
  position:absolute;inset:0;z-index:0;
  transition:background 1.4s var(--ease-soft);
  pointer-events:none;
}

/* ── Film-strip thumbnail rail ── */
#g-rail{
  position:absolute;bottom:0;left:0;right:0;
  height:160px;
  display:flex;align-items:center;
  padding:0 60px;
  gap:10px;
  z-index:50;
  background:linear-gradient(to top, #080807 60%, transparent);
  overflow:hidden;
}

.g-thumb{
  position:relative;
  flex-shrink:0;
  width:72px;height:90px;
  overflow:hidden;
  cursor:pointer;
  transition:width .5s var(--ease-cin), height .5s var(--ease-cin), opacity .3s;
  opacity:.38;
  border:1px solid transparent;
}
.g-thumb:hover{opacity:.7}
.g-thumb.active{
  width:88px;height:106px;
  opacity:1;
  border-color:rgba(196,168,130,.4);
}
.g-thumb-canvas{width:100%;height:100%;overflow:hidden}
.g-thumb-canvas svg{width:100%;height:100%}
.g-thumb-num{
  position:absolute;bottom:5px;right:7px;
  font-size:7px;font-weight:200;letter-spacing:.28em;
  color:rgba(196,168,130,.6);
}

/* ── Large arrow nav ── */
.g-arr{
  position:absolute;
  top:calc(50% - 80px);transform:translateY(-50%);
  width:56px;height:56px;
  background:rgba(196,168,130,.04);
  border:1px solid rgba(196,168,130,.12);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:60;
  transition:background .3s, border-color .3s, opacity .3s;
}
.g-arr:hover{background:rgba(196,168,130,.1);border-color:rgba(196,168,130,.3)}
.g-arr.dim{opacity:.15;pointer-events:none}
.g-arr svg{stroke:var(--accent);width:20px;height:20px}
#ga-p{left:20px}
#ga-n{right:20px}

/* ── Collection title (top) ── */
#g-title{
  position:absolute;top:0;left:0;right:0;
  padding:30px 44px;z-index:50;
  display:flex;align-items:baseline;gap:18px;
  opacity:0;transition:opacity .6s .2s;
}
#l3.in #g-title{opacity:1}
.g-col-name{
  font-family:'Cormorant Garamond',serif;
  font-weight:300;font-style:italic;
  font-size:clamp(18px,2.5vw,28px);
  color:rgba(196,168,130,.55);letter-spacing:.06em;
}
.g-counter{
  font-size:9px;font-weight:200;letter-spacing:.4em;
  color:var(--muted);text-transform:uppercase;
  margin-left:auto;
}

/* ── Transition animations ── */
.art-enter-r{animation:aer .8s var(--ease-cin) forwards}
.art-enter-l{animation:ael .8s var(--ease-cin) forwards}
.art-exit-l{animation:axl .6s var(--ease-cin) forwards}
.art-exit-r{animation:axr .6s var(--ease-cin) forwards}
@keyframes aer{from{opacity:0;transform:translateX(60px) scale(.95)}to{opacity:1;transform:none}}
@keyframes ael{from{opacity:0;transform:translateX(-60px) scale(.95)}to{opacity:1;transform:none}}
@keyframes axl{from{opacity:1;transform:none}to{opacity:0;transform:translateX(-40px) scale(.97)}}
@keyframes axr{from{opacity:1;transform:none}to{opacity:0;transform:translateX(40px) scale(.97)}}

/* slide transitions (L2) */
.s-enter-r{animation:ser .75s var(--ease-cin) forwards}
.s-enter-l{animation:sel .75s var(--ease-cin) forwards}
.s-exit-l{animation:sxl .55s var(--ease-cin) forwards}
.s-exit-r{animation:sxr .55s var(--ease-cin) forwards}
@keyframes ser{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}
@keyframes sel{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:none}}
@keyframes sxl{from{opacity:1;transform:none}to{opacity:0;transform:translateX(-30px)}}
@keyframes sxr{from{opacity:1;transform:none}to{opacity:0;transform:translateX(30px)}}

/* progress bar */
#prog{position:fixed;bottom:0;left:0;height:1px;background:var(--accent);z-index:200;transition:width .55s var(--ease-cin)}

/* Ken-burns on active artwork */
@keyframes kenb{from{transform:scale(1)}to{transform:scale(1.04)}}
.artwork.active .art-canvas{animation:kenb 8s var(--ease-soft) forwards}

@media(max-width:640px){
  .strip{width:56px;height:190px}
  .strip:hover{width:70px}
  .strip-row{gap:6px}
  .strip-letter{font-size:40px}
  .cslide-card{width:88vw;height:52vh;margin-left:0}
  .cslide-ghost{display:none}
  header{padding:18px 22px}
  .art-frame{width:88vw;height:60vw}
  .art-meta{display:none}
  .g-thumb{width:50px;height:64px}
  .g-thumb.active{width:62px;height:76px}
  #g-rail{padding:0 30px;gap:7px}
}
@media(prefers-reduced-motion:reduce){*{transition-duration:.01ms!important;animation-duration:.01ms!important}}
</style>
</head>
<body>

<header>
  <span class="h-logo">Sahaj Gallery<span class="h-logo-sub" id="h-col-label" style="opacity:0;transition:opacity .5s"></span></span>
  <span class="h-mid" id="h-mid">2024 — Collections</span>
  <button class="h-back" id="h-back" onclick="goBack()">← Back</button>
</header>

<div id="prog"></div>

<!-- ════ L1: Welcome catalogue strips ════ -->
<div id="l1">
  <div class="strip-row" id="srow"></div>
</div>

<!-- ════ L2: Fullscreen collection slideshow ════ -->
<div id="l2">
  <!-- slides injected by JS -->
  <button class="slide-nav dim" id="nav-prev" onclick="slideNav(-1)">
    <svg viewBox="0 0 22 22" fill="none" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="14,4 7,11 14,18"/></svg>
  </button>
  <button class="slide-nav" id="nav-next" onclick="slideNav(1)">
    <svg viewBox="0 0 22 22" fill="none" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="8,4 15,11 8,18"/></svg>
  </button>
  <div id="l2-bar">
    <button class="btn-close" onclick="goBack()">
      <svg viewBox="0 0 14 14" fill="none" stroke-width="1.2" stroke-linecap="round"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg>
    </button>
  </div>
</div>

<!-- ════ L3: Immersive Gallery ════ -->
<div id="l3">
  <div id="g-wash"></div>

  <!-- Collection title bar -->
  <div id="g-title">
    <span class="g-col-name" id="g-col-name">The Eyes</span>
    <span class="g-counter" id="g-counter">01 / 10</span>
  </div>

  <!-- Artwork stage -->
  <div id="g-stage">
    <!-- artworks injected by JS -->
  </div>

  <!-- Arrow navigation -->
  <button class="g-arr dim" id="ga-p" onclick="navImg(-1)">
    <svg viewBox="0 0 22 22" fill="none" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"><polyline points="14,4 7,11 14,18"/></svg>
  </button>
  <button class="g-arr" id="ga-n" onclick="navImg(1)">
    <svg viewBox="0 0 22 22" fill="none" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"><polyline points="8,4 15,11 8,18"/></svg>
  </button>

  <!-- Thumbnail film-strip rail -->
  <div id="g-rail">
    <!-- thumbs injected by JS -->
  </div>
</div>

/* ─────────────── STATE ─────────────── */
let level = 1;
let curSlide = 0;
let imgIdx  = 0;
let animating = false;
const TOTAL_IMGS = EYE_ART.length;

/* ─────────────── BUILD L1 STRIPS ─────────────── */
const srow = document.getElementById('srow');
COLS.forEach((name, i) => {
  const s = document.createElement('div');
  s.className = 'strip';
  s.innerHTML = `
    <span class="strip-num">${String(i+1).padStart(2,'0')}</span>
    <span class="strip-letter">${SAHAJ[i]}</span>
    <span class="strip-name">${name}</span>
  `;
  s.addEventListener('click', () => openL2(i));
  srow.appendChild(s);
});

/* ─────────────── BUILD L2 SLIDES ─────────────── */
const l2El = document.getElementById('l2');
COLS.forEach((name, i) => {
  const slide = document.createElement('div');
  slide.className = 'cslide';
  slide.dataset.i = i;
  const prevBg = GHOST_BG[(i - 1 + 5) % 5];
  slide.innerHTML = `
    <div class="cslide-ghost"><div class="ghost-bg" style="background:${prevBg}"></div></div>
    <div class="cslide-card" onclick="openL3()" style="cursor:pointer">
      <div class="cb-bl"></div><div class="cb-br"></div>
      <div class="card-bg"></div>
      <div class="card-arr">
        <svg viewBox="0 0 14 14" fill="none" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><line x1="2" y1="12" x2="12" y2="2"/><polyline points="5,2 12,2 12,9"/></svg>
      </div>
      <div class="card-name">${name}</div>
      <span class="card-counter">${String(i+1).padStart(2,'0')} / ${String(COLS.length).padStart(2,'0')}</span>
    </div>
  `;
  l2El.insertBefore(slide, document.getElementById('nav-prev'));
});

/* ─────────────── BUILD L3 GALLERY ─────────────── */
const gStage = document.getElementById('g-stage');
const gRail  = document.getElementById('g-rail');

EYE_ART.forEach((art, i) => {
  // Full artwork
  const aw = document.createElement('div');
  aw.className = 'artwork';
  aw.dataset.i = i;
  aw.innerHTML = `
    <div class="art-glow" style="background:${art.glow}"></div>
    <div class="art-frame">
      <div class="af-bl"></div><div class="af-br"></div>
      <div class="art-canvas">${art.svg}</div>
    </div>
    <div class="art-meta">
      <div class="art-num">${String(i+1).padStart(2,'0')}</div>
      <div class="art-title">${art.title}</div>
      <div class="art-line"></div>
      <div class="art-desc">${art.desc}</div>
      <div class="art-dim">${art.dim}</div>
    </div>
  `;
  gStage.appendChild(aw);

  // Thumbnail
  const th = document.createElement('div');
  th.className = 'g-thumb';
  th.dataset.i = i;
  th.innerHTML = `
    <div class="g-thumb-canvas">${art.svg}</div>
    <span class="g-thumb-num">${String(i+1).padStart(2,'0')}</span>
  `;
  th.addEventListener('click', () => goToImg(i));
  gRail.appendChild(th);
});

/* ─────────────── HELPERS ─────────────── */
function setProgress(val){ document.getElementById('prog').style.width = val+'%'; }
function getSlide(i){ return l2El.querySelector(`.cslide[data-i="${i}"]`); }

function activateSlide(i, dir){
  const prev = l2El.querySelector('.cslide.active');
  const next = getSlide(i);
  if(!next) return;
  if(prev && prev !== next){
    const exitCls = dir === 1 ? 's-exit-l' : 's-exit-r';
    prev.classList.add(exitCls);
    setTimeout(() => { prev.classList.remove('active', exitCls); }, 550);
  } else if(prev){ prev.classList.remove('active'); }
  const enterCls = dir === 1 ? 's-enter-r' : dir === -1 ? 's-enter-l' : null;
  next.classList.add('active');
  if(enterCls) next.classList.add(enterCls);
  if(enterCls) setTimeout(() => next.classList.remove(enterCls), 750);
  curSlide = i;
  setProgress(((i+1)/COLS.length)*100);
  document.getElementById('nav-prev').classList.toggle('dim', i === 0);
  document.getElementById('nav-next').classList.toggle('dim', i === COLS.length-1);
  document.getElementById('h-mid').textContent = COLS[i];
}

/* ─────────────── OPEN L2 ─────────────── */
function openL2(startIdx){
  if(animating) return;
  animating = true;
  document.getElementById('l1').classList.add('out');
  document.getElementById('h-back').classList.add('show');
  setTimeout(() => {
    l2El.classList.add('in');
    activateSlide(startIdx, 0);
    level = 2;
    animating = false;
  }, 480);
}

/* ─────────────── SLIDE NAV in L2 ─────────────── */
function slideNav(dir){
  if(animating) return;
  const next = curSlide + dir;
  if(next < 0 || next >= COLS.length) return;
  animating = true;
  activateSlide(next, dir);
  setTimeout(() => { animating = false; }, 760);
}

/* ─────────────── OPEN L3 ─────────────── */
function openL3(){
  if(animating) return;
  animating = true;
  imgIdx = 0;
  l2El.classList.remove('in');
  setTimeout(() => {
    const l3 = document.getElementById('l3');
    l3.classList.add('in');
    document.getElementById('g-col-name').textContent = COLS[curSlide];
    // show collection name under logo, hide centre label
    const colLabel = document.getElementById('h-col-label');
    colLabel.textContent = COLS[curSlide].toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
    colLabel.style.opacity = '1';
    document.getElementById('h-mid').style.opacity = '0';
    activateArtwork(0, 0);
    level = 3;
    animating = false;
  }, 480);
}

/* ─────────────── ARTWORK NAVIGATION ─────────────── */
function activateArtwork(i, dir){
  const prev = gStage.querySelector('.artwork.active');
  const next = gStage.querySelector(`.artwork[data-i="${i}"]`);
  if(!next) return;

  if(prev && prev !== next){
    const exitCls = dir === 1 ? 'art-exit-l' : 'art-exit-r';
    prev.classList.add(exitCls);
    setTimeout(() => { prev.classList.remove('active', exitCls); }, 620);
  } else if(prev){ prev.classList.remove('active'); }

  const enterCls = dir === 1 ? 'art-enter-r' : dir === -1 ? 'art-enter-l' : null;
  next.classList.add('active');
  if(enterCls){ next.classList.add(enterCls); setTimeout(() => next.classList.remove(enterCls), 820); }

  // ambient background wash
  document.getElementById('g-wash').style.background =
    `radial-gradient(ellipse at 50% 40%, ${EYE_ART[i].glow}18 0%, transparent 70%)`;

  imgIdx = i;
  document.getElementById('g-counter').textContent =
    `${String(i+1).padStart(2,'0')} / ${String(TOTAL_IMGS).padStart(2,'0')}`;

  // thumbnails
  document.querySelectorAll('.g-thumb').forEach(t => t.classList.toggle('active', parseInt(t.dataset.i) === i));

  // scroll thumb into view
  const activeTh = gRail.querySelector('.g-thumb.active');
  if(activeTh) activeTh.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});

  // arrows
  document.getElementById('ga-p').classList.toggle('dim', i === 0);
  document.getElementById('ga-n').classList.toggle('dim', i === TOTAL_IMGS - 1);

  setProgress(((i+1)/TOTAL_IMGS)*100);
}

function navImg(dir){
  if(animating) return;
  const next = imgIdx + dir;
  if(next < 0 || next >= TOTAL_IMGS) return;
  animating = true;
  activateArtwork(next, dir);
  setTimeout(() => { animating = false; }, 820);
}

function goToImg(i){
  if(animating || i === imgIdx) return;
  const dir = i > imgIdx ? 1 : -1;
  animating = true;
  activateArtwork(i, dir);
  setTimeout(() => { animating = false; }, 820);
}

/* ─────────────── BACK ─────────────── */
function goBack(){
  if(animating) return;
  animating = true;
  if(level === 3){
    document.getElementById('l3').classList.remove('in');
    const active = gStage.querySelector('.artwork.active');
    if(active) active.classList.remove('active');
    // restore header
    document.getElementById('h-col-label').style.opacity = '0';
    document.getElementById('h-mid').style.opacity = '1';
    setTimeout(() => {
      l2El.classList.add('in');
      level = 2;
      setProgress(((curSlide+1)/COLS.length)*100);
      animating = false;
    }, 500);
  } else if(level === 2){
    l2El.classList.remove('in');
    const active = l2El.querySelector('.cslide.active');
    if(active) active.classList.remove('active');
    setTimeout(() => {
      document.getElementById('l1').classList.remove('out');
      document.getElementById('h-back').classList.remove('show');
      document.getElementById('h-mid').textContent = '2024 — Collections';
      setProgress(0);
      level = 1;
      animating = false;
    }, 500);
  }
}

/* ─────────────── KEYBOARD ─────────────── */
document.addEventListener('keydown', e => {
  if(e.key === 'Escape') goBack();
  if(e.key === 'ArrowRight'){
    if(level === 2) slideNav(1);
    else if(level === 3) navImg(1);
  }
  if(e.key === 'ArrowLeft'){
    if(level === 2) slideNav(-1);
    else if(level === 3) navImg(-1);
  }
});

/* ─────────────── TOUCH SWIPE ─────────────── */
let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if(Math.abs(dx) > 40){
    if(level === 2) slideNav(dx < 0 ? 1 : -1);
    else if(level === 3) navImg(dx < 0 ? 1 : -1);
  }
}, {passive:true});

/* init */
setProgress(0);
</script>
</body>
